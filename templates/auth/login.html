{% extends "base.html" %}
{% block title %}云想衣裳 - 登录{% endblock %}
{% block content %}
<style>
body { padding-top: 0 !important; }
.navbar, .footer-section { display: none !important; }

.ink-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(180deg, #f2f2f7 0%, #e8e8ed 50%, #f2f2f7 100%);
}

.login-shell {
    position: relative; z-index: 3;
    width: min(980px, 96vw);
    display: grid;
    grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
    border-radius: 24px; overflow: hidden;
    background: linear-gradient(135deg, rgba(255,255,255,0.48), rgba(255,255,255,0.32));
    backdrop-filter: saturate(200%) blur(40px) brightness(1.05);
    -webkit-backdrop-filter: saturate(200%) blur(40px) brightness(1.05);
    border: 1px solid rgba(255,255,255,0.35);
    box-shadow: 0 0 0 0.5px rgba(255,255,255,0.4), 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
}

.login-panel { padding: 3.25rem 2.75rem; background: transparent; }
.brand-mark { text-align: center; margin-bottom: 2.2rem; }
.brand-seal {
    width: 72px; height: 72px; margin: 0 auto 1rem;
    display: grid; place-items: center; color: #fff;
    border-radius: 50%; background: #0071e3;
    box-shadow: 0 0 0 0.5px rgba(0,113,227,0.3), 0 4px 16px rgba(0,113,227,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
}
.brand-seal i { font-size: 1.75rem; }
.brand-mark h1 {
    margin: 0; color: #1d1d1f;
    font-size: 1.75rem; letter-spacing: -0.02em; font-weight: 700;
}
.brand-mark p { margin: 0.6rem 0 0; color: #6e6e73; }
.login-form .form-group { margin-bottom: 1.25rem; }
.login-form .form-label {
    color: #1d1d1f; font-weight: 600; font-size: 0.8125rem;
    letter-spacing: -0.01em; margin-bottom: 6px;
}
.input-brush { position: relative; }
.input-brush .form-control {
    height: 48px; padding-left: 2.9rem;
    border-radius: 980px;
    border: 1px solid rgba(255,255,255,0.35);
    background: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(255,255,255,0.3)); color: #1d1d1f;
}
.input-brush .form-control:focus {
    border-color: #0071e3;
    box-shadow: 0 0 0 3px rgba(0,113,227,0.1), 0 0 0 0.5px rgba(0,113,227,0.3); background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.65));
}
.input-brush i {
    position: absolute; left: 1.08rem; top: 50%;
    transform: translateY(-50%); color: #86868b;
}
.form-options {
    display: flex; justify-content: space-between; align-items: center;
    margin: 1.25rem 0 1.5rem; color: #6e6e73; font-size: 0.875rem;
}
.form-options a { color: #0071e3; font-weight: 600; }
.form-options a:hover { color: #0077ed; }
.ink-login-btn {
    width: 100%; height: 48px;
    border: 0; border-radius: 980px; color: #fff;
    background: #0071e3;
    font-weight: 600; font-size: 0.9375rem; letter-spacing: -0.01em;
    box-shadow: 0 0 0 0.5px rgba(0,113,227,0.3), 0 2px 8px rgba(0,113,227,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.ink-login-btn:hover {
    background: #0077ed; transform: translateY(-0.5px);
    box-shadow: 0 0 0 0.5px rgba(0,119,237,0.4), 0 4px 16px rgba(0,113,227,0.25), inset 0 1px 0 rgba(255,255,255,0.25);
}
.ink-login-btn:active { background: #006edb; transform: translateY(0.5px); }
.ink-login-btn:disabled { opacity: 0.5; cursor: wait; transform: none; }
.login-footer {
    margin-top: 1.5rem; padding-top: 1.2rem;
    border-top: 1px solid rgba(255,255,255,0.35);
    text-align: center; color: #6e6e73; font-size: 0.875rem;
}
.login-footer a { color: #0071e3; font-weight: 600; }
.ink-poem {
    position: relative; min-height: 520px; padding: 3rem;
    color: #f5f5f7;
    background: linear-gradient(135deg, #1d1d1f 0%, #2d2d30 100%);
    overflow: hidden;
}
.poem-content {
    position: relative; z-index: 1; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
}
.poem-content h2 {
    margin: 0 0 0.8rem; font-size: 1.75rem;
    letter-spacing: -0.02em; color: #f5f5f7; font-weight: 700;
}
.poem-content p { margin: 0 0 2rem; color: rgba(245,245,247,0.7); }
.ink-feature-list { display: grid; gap: 0.75rem; width: 100%; }
.ink-feature {
    display: flex; align-items: center; gap: 0.85rem;
    padding: 0.75rem 1rem; border-radius: 12px;
    color: rgba(245,245,247,0.9);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
}
.ink-feature i { color: #64d2ff; width: 20px; text-align: center; }
@media (max-width: 820px) {
    .login-shell { grid-template-columns: 1fr; }
    .ink-poem { display: none; }
    .login-panel { padding: 2.2rem 1.55rem; }
}
</style>

<div class="ink-login" id="inkLogin">
    <div class="login-shell">
        <section class="login-panel">
            <div class="brand-mark">
                <div class="brand-seal"><i class="fas fa-wand-magic-sparkles"></i></div>
                <h1>云想衣裳</h1>
                <p>更懂你的AI时尚顾问</p>
            </div>
            <form class="login-form" id="loginForm" method="POST"
                  action="{{ url_for('auth.login', next=request.args.get('next')) if request.args.get('next') else url_for('auth.login') }}">
                {{ form.hidden_tag() }}
                <div class="form-group">
                    <label for="username" class="form-label">用户名</label>
                    <div class="input-brush">
                        <input type="text" class="form-control" id="username"
                               name="username" placeholder="请输入用户名" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-brush">
                        <input type="password" class="form-control" id="password"
                               name="password" placeholder="请输入密码" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label class="form-check-label" for="remember">
                        <input type="checkbox" class="form-check-input" id="remember"
                               name="remember_me"> 记住我
                    </label>
                    <a href="{{ url_for('auth.reset_password_request') }}">忘记密码</a>
                </div>
                <button type="submit" class="ink-login-btn" id="loginBtn">登 录</button>
            </form>
            <div class="login-footer">
                <span>还没有账户？</span>
                <a href="{{ url_for('auth.register') }}">立即注册</a>
            </div>
        </section>
        <aside class="ink-poem">
            <div class="poem-content">
                <h2>云裳入画</h2>
                <p>以AI识衣，以风格成章</p>
                <div class="ink-feature-list">
                    <div class="ink-feature"><i class="fas fa-shirt"></i><span>智能衣柜整理</span></div>
                    <div class="ink-feature"><i class="fas fa-lightbulb"></i><span>个性穿搭推荐</span></div>
                    <div class="ink-feature"><i class="fas fa-palette"></i><span>专属风格分析</span></div>
                    <div class="ink-feature"><i class="fas fa-robot"></i><span>AI时尚顾问</span></div>
                </div>
            </div>
        </aside>
    </div>
</div>

<div class="modal fade" id="errorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title">登录失败</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="errorModalBody">用户名或密码错误，请检查后重试。</div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">确定</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('loginForm');
    var button = document.getElementById('loginBtn');

    form.addEventListener('submit', function(event) {
        event.preventDefault();
        if (button.disabled) return;
        button.disabled = true;
        button.textContent = '登录中...';

        fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: {
                'Accept': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(function(response) {
            return response.json().then(function(data) {
                return { ok: response.ok, data: data };
            });
        })
        .then(function(result) {
            if (result.ok && result.data.success) {
                var target = "{{ url_for('main.index') }}";
                button.textContent = '登录成功';
                button.style.background = '#30d158';
                setTimeout(function() { window.location.href = target; }, 400);
                return;
            }
            showError(result.data.error || '用户名或密码错误');
            button.disabled = false;
            button.textContent = '登 录';
        })
        .catch(function() {
            showError('网络错误，请稍后重试');
            button.disabled = false;
            button.textContent = '登 录';
        });
    });

    function showError(message) {
        document.getElementById('errorModalBody').textContent = message;
        var modal = new bootstrap.Modal(document.getElementById('errorModal'));
        modal.show();
    }

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            showError({{ messages[0]|tojson }});
        {% endif %}
    {% endwith %}
});
</script>
{% endblock %}
