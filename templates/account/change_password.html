{% extends "base.html" %}

{% block title %}修改密码 - 云想衣裳{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-key me-2"></i>修改密码</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('main.change_password') }}" id="passwordForm">
                        <div class="mb-3">
                            <label for="current_password" class="form-label">当前密码</label>
                            <input type="password" class="form-control" id="current_password" name="current_password" required>
                            <div class="form-text">请输入您当前的登录密码</div>
                        </div>

                        <div class="mb-3">
                            <label for="new_password" class="form-label">新密码</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" required>
                            <div class="form-text">
                                <small>密码要求：</small>
                                <ul class="small mb-0 mt-1">
                                    <li id="lengthCheck" class="text-muted">至少8个字符</li>
                                    <li id="charCheck" class="text-muted">包含字母和数字</li>
                                </ul>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">确认新密码</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                            <div class="form-text">
                                <span id="passwordMatch" class="text-muted">请再次输入新密码</span>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('main.account_settings') }}" class="btn btn-secondary me-md-2">返回</a>
                            <button type="submit" class="btn btn-primary" id="submitBtn">修改密码</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 密码安全提示 -->
            <div class="card shadow-sm mt-4">
                <div class="card-header">
                    <h6 class="mb-0"><i class="fas fa-shield-alt me-2"></i>密码安全提示</h6>
                </div>
                <div class="card-body">
                    <ul class="small mb-0">
                        <li>使用包含字母、数字和特殊字符的复杂密码</li>
                        <li>避免使用生日、电话号码等容易猜到的信息</li>
                        <li>定期更换密码以提高安全性</li>
                        <li>不要在多个网站使用相同的密码</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 实时密码验证的JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const newPassword = document.getElementById('new_password');
    const confirmPassword = document.getElementById('confirm_password');
    const lengthCheck = document.getElementById('lengthCheck');
    const charCheck = document.getElementById('charCheck');
    const passwordMatch = document.getElementById('passwordMatch');
    const submitBtn = document.getElementById('submitBtn');

    function validatePassword() {
        const password = newPassword.value;

        // 验证长度
        if (password.length >= 8) {
            lengthCheck.className = 'text-success';
            lengthCheck.innerHTML = '✓ 至少8个字符';
        } else {
            lengthCheck.className = 'text-danger';
            lengthCheck.innerHTML = '✗ 至少8个字符';
        }

        // 验证字符类型
        const hasLetter = /[a-zA-Z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        if (hasLetter && hasNumber) {
            charCheck.className = 'text-success';
            charCheck.innerHTML = '✓ 包含字母和数字';
        } else {
            charCheck.className = 'text-danger';
            charCheck.innerHTML = '✗ 包含字母和数字';
        }

        // 验证密码匹配
        if (confirmPassword.value) {
            if (password === confirmPassword.value) {
                passwordMatch.className = 'text-success';
                passwordMatch.innerHTML = '✓ 密码匹配';
            } else {
                passwordMatch.className = 'text-danger';
                passwordMatch.innerHTML = '✗ 密码不匹配';
            }
        }

        // 更新提交按钮状态
        updateSubmitButton();
    }

    function updateSubmitButton() {
        const password = newPassword.value;
        const hasValidLength = password.length >= 8;
        const hasValidChars = /[a-zA-Z]/.test(password) && /[0-9]/.test(password);
        const passwordsMatch = password === confirmPassword.value;

        submitBtn.disabled = !(hasValidLength && hasValidChars && passwordsMatch);
    }

    newPassword.addEventListener('input', validatePassword);
    confirmPassword.addEventListener('input', validatePassword);

    // 初始验证
    validatePassword();
});
</script>

<style>
.text-success {
    font-weight: 500;
}

.text-danger {
    font-weight: 500;
}

#submitBtn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
</style>
{% endblock %}
