{% extends "base.html" %}{% block title %}注册 - 云想衣裳{% endblock %}{% block content %}<style>    body { padding-top: 0!important; }    .navbar, .footer-section { display: none!important; }</style><div class="auth-container">    <div class="auth-wrapper" style="max-width:480px;grid-template-columns:1fr;">        <div class="auth-card" style="padding:2.5rem;">            <div class="text-center mb-4">                <div style="width:48px;height:48px;border-radius:12px;background:rgba(0,113,227,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">                    <i class="fas fa-wand-magic-sparkles" style="color:#0071e3;font-size:1.25rem;"></i>                </div>                <h2 style="font-size:1.5rem;font-weight:700;color:#1d1d1f;letter-spacing:-0.02em;margin-bottom:4px;">创建账户</h2>                <p style="color:#6e6e73;font-size:0.9375rem;">加入云想衣裳，开启智能穿搭体验</p>            </div>            <form method="POST" action="{{ url_for('auth.register') }}">                {% if form %}{{ form.hidden_tag() }}{% endif %}                <div class="mb-3">                    <label for="username" class="form-label">用户名</label>                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>                </div>                <div class="mb-3">                    <label for="email" class="form-label">邮箱地址</label>                    <input type="email" class="form-control" id="email" name="email" placeholder="请输入邮箱地址" required>                </div>                <div class="mb-3">                    <label for="password" class="form-label">密码</label>                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>                </div>                <div class="mb-3">                    <label for="confirm_password" class="form-label">确认密码</label>                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="请再次输入密码" required>                </div>                <div class="form-check mb-4">                    <input type="checkbox" class="form-check-input" id="agree" required>                    <label class="form-check-label" for="agree" style="font-size:0.875rem;color:#6e6e73;">我已阅读并同意服务条款与隐私政策</label>                </div>                <button type="submit" class="btn btn-primary w-100" style="padding:10px;">注册账户</button>            </form>            <div class="text-center mt-3" style="font-size:0.875rem;color:#6e6e73;">                已有账户？<a href="{{ url_for('auth.login') }}">立即登录</a>            </div>        </div>    </div></div>{% endblock %}
