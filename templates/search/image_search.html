{%- extends "base.html" -%}
{%- block title -%}图片搜索 - 云想衣橱{%- endblock -%}
{%- block content -%}
<style>
.img-search-page {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 48px;
}
.img-search-header {
    text-align: center;
    margin-bottom: 32px;
}
.img-search-header .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 980px;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 60%),
                linear-gradient(135deg, rgba(0,113,227,0.12), rgba(0,113,227,0.06));
    color: #0071e3;
    font-size: 0.8125rem;
    font-weight: 600;
    margin-bottom: 16px;
    border: 1px solid rgba(0,113,227,0.15);
    border-top-color: rgba(0,113,227,0.22);
    box-shadow: 0 0 0 0.5px rgba(0,113,227,0.1), 0 2px 8px rgba(0,113,227,0.06),
                inset 0 0.5px 0 rgba(255,255,255,0.4);
    backdrop-filter: saturate(180%) blur(16px);
    position: relative;
    overflow: hidden;
}
.img-search-header h1 {
    font-size: clamp(1.75rem, 3.5vw, 2.5rem);
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 10px;
}
.img-search-header .tagline {
    font-size: 1.0625rem;
    color: #6e6e73;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.55;
}
.upload-zone {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    text-align: center;
    padding: 48px 24px;
    border: 2px dashed rgba(0,113,227,0.2) !important;
    border-radius: 16px !important;
    transition: all 0.3s ease;
}
.upload-zone:hover,
.upload-zone.dragover {
    border-color: rgba(0,113,227,0.4) !important;
    background: linear-gradient(135deg, rgba(0,113,227,0.04), rgba(0,113,227,0.02)) !important;
}
.upload-zone .upload-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, rgba(0,113,227,0.12), rgba(0,113,227,0.06));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 1.375rem;
    color: #0071e3;
}
.upload-zone h3 {
    font-size: 1.0625rem;
    font-weight: 600;
    color: #1d1d1f;
    margin-bottom: 6px;
}
.upload-zone p {
    font-size: 0.875rem;
    color: #86868b;
    margin: 0;
}
#preview {
    max-width: 280px;
    max-height: 280px;
    border-radius: 12px;
    margin: 16px auto;
    display: none;
    object-fit: contain;
}
.search-btn-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}
.img-results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 20px;
}
@media (max-width: 576px) {
    .img-results-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }
}
.img-result-card {
    position: relative;
    overflow: hidden;
    padding: 0;
}
.img-result-card .card-body {
    padding: 12px;
}
.img-result-card .result-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px 12px 0 0;
}
.similarity-pill {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 3px 10px;
    border-radius: 980px;
    font-size: 0.6875rem;
    font-weight: 600;
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    z-index: 2;
}
.sim-high {
    background: linear-gradient(135deg, rgba(48,209,88,0.85), rgba(40,199,78,0.9));
    color: #fff;
    box-shadow: 0 2px 8px rgba(48,209,88,0.3);
}
.sim-medium {
    background: linear-gradient(135deg, rgba(255,159,10,0.85), rgba(246,142,8,0.9));
    color: #fff;
    box-shadow: 0 2px 8px rgba(255,159,10,0.3);
}
.sim-low {
    background: linear-gradient(135deg, rgba(255,69,58,0.85), rgba(235,55,45,0.9));
    color: #fff;
    box-shadow: 0 2px 8px rgba(255,69,58,0.3);
}
.result-name {
    font-size: 0.875rem;
    font-weight: 600;
    color: #1d1d1f;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 4px;
}
.result-price {
    font-size: 1rem;
    font-weight: 700;
    color: #0071e3;
    margin-bottom: 4px;
}
.result-meta {
    font-size: 0.75rem;
    color: #86868b;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 8px;
}
.result-desc {
    font-size: 0.8125rem;
    color: #6e6e73;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
    margin-bottom: 10px;
}
.loading-box {
    text-align: center;
    padding: 32px;
    display: none;
}
.loading-box .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(0,113,227,0.15);
    border-top-color: #0071e3;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}
.msg-bar {
    padding: 10px 16px;
    border-radius: 10px;
    margin: 12px 0;
    font-size: 0.9375rem;
    display: none;
}
.msg-bar.msg-error {
    background: linear-gradient(135deg, rgba(255,69,58,0.12), rgba(255,69,58,0.06));
    color: #c42b22;
    border: 1px solid rgba(255,69,58,0.15);
}
.msg-bar.msg-success {
    background: linear-gradient(135deg, rgba(48,209,88,0.12), rgba(48,209,88,0.06));
    color: #1a7a34;
    border: 1px solid rgba(48,209,88,0.15);
}
.results-count-bar {
    font-size: 0.9375rem;
    font-weight: 600;
    color: #1d1d1f;
    margin-bottom: 4px;
}
.results-count-bar small {
    font-weight: 400;
    color: #86868b;
}
</style>

<div class="img-search-page">
    <div class="img-search-header">
        <div class="section-badge"><i class="fas fa-camera"></i> <span>图片搜索</span></div>
        <h1>智能图片搜索</h1>
        <p class="tagline">上传商品图片，发现相似时尚单品</p>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="upload-zone" id="uploadArea">
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
                <div class="upload-icon"><i class="fas fa-cloud-arrow-up"></i></div>
                <h3>点击选择图片或拖拽到此处</h3>
                <p>支持 JPG、PNG 格式，最大 5MB</p>
            </div>

            <img id="preview" alt="预览">

            <div class="search-btn-bar">
                <button class="btn btn-primary" id="searchBtn" disabled>
                    <i class="fas fa-magnifying-glass me-1"></i>开始搜索
                </button>
            </div>
        </div>
    </div>

    <div class="loading-box" id="loading">
        <div class="spinner"></div>
        <p style="color:#6e6e73;">正在使用 AI 分析图片特征，搜索相似商品...</p>
    </div>

    <div class="msg-bar msg-error" id="errorMsg"></div>
    <div class="msg-bar msg-success" id="successMsg"></div>

    <div id="resultsSection" style="display:none;">
        <div class="results-count-bar" id="resultCount"></div>
        <div class="img-results-grid" id="productGrid"></div>
    </div>
</div>
{%- endblock -%}
{%- block scripts -%}
<script>
document.addEventListener('DOMContentLoaded', function() {
    var uploadArea = document.getElementById('uploadArea');
    var fileInput = document.getElementById('fileInput');
    var preview = document.getElementById('preview');
    var searchBtn = document.getElementById('searchBtn');
    var loading = document.getElementById('loading');
    var errorMsg = document.getElementById('errorMsg');
    var successMsg = document.getElementById('successMsg');
    var resultsSection = document.getElementById('resultsSection');
    var resultCount = document.getElementById('resultCount');
    var productGrid = document.getElementById('productGrid');
    var currentFile = null;

    uploadArea.addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) processFile(e.target.files[0]);
    });
    uploadArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', function(e) {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', function(e) {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
    });
    searchBtn.addEventListener('click', handleSearch);

    function processFile(file) {
        if (!file.type.startsWith('image/')) {
            showMsg('请选择图片文件（JPG、PNG格式）', 'error');
            return;
        }
        if (file.size > 5 * 1024 * 1024) {
            showMsg('文件大小不能超过5MB', 'error');
            return;
        }
        currentFile = file;
        var reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
            searchBtn.disabled = false;
            hideMsgs();
            showMsg('图片已选择，点击“开始搜索”', 'success');
        };
        reader.readAsDataURL(file);
    }

    function handleSearch() {
        if (!currentFile) return;
        hideMsgs();
        loading.style.display = 'block';
        resultsSection.style.display = 'none';
        searchBtn.disabled = true;

        var formData = new FormData();
        formData.append('image', currentFile);

        fetch('/search/api/search_by_image', {
            method: 'POST',
            body: formData
        })
        .then(function(response) { return response.json(); })
        .then(function(data) {
            loading.style.display = 'none';
            searchBtn.disabled = false;
            if (data.success) {
                var filtered = data.results.filter(function(p) {
                    var score = p.similarity_score || p.similarity || 0;
                    return score * 100 > 45;
                });
                showMsg('找到 ' + filtered.length + ' 个相似商品（相似度>45%）', 'success');
                displayResults(filtered);
            } else {
                showMsg(data.message || '搜索失败', 'error');
            }
        })
        .catch(function(error) {
            loading.style.display = 'none';
            searchBtn.disabled = false;
            showMsg('网络错误: ' + error.message, 'error');
        });
    }

    function displayResults(products) {
        resultCount.innerHTML = '找到 <strong>' + products.length + '</strong> 个相似商品 <small>（相似度>45%）</small>';
        productGrid.innerHTML = '';

        if (products.length === 0) {
            productGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#86868b;">未找到相似度大于45%的商品</div>';
            resultsSection.style.display = 'block';
            return;
        }

        products.forEach(function(product) {
            var images = Array.isArray(product.images) ? product.images : [];
            var imageUrl = images.length > 0 ? images[0] : '/static/images/placeholder.jpg';
            var score = product.similarity_score || product.similarity || 0;
            var percent = Math.round(score * 100);
            var simClass = percent >= 80 ? 'sim-high' : (percent >= 60 ? 'sim-medium' : 'sim-low');
            var name = product.name || '未知商品';
            var price = parseFloat(product.price) || 0;
            var desc = product.description || '优质商品';
            var category = product.category || '服饰';
            var brand = product.brand || '时尚品牌';
            var pid = product.id || 0;

            var card = document.createElement('div');
            card.className = 'card img-result-card';
            card.innerHTML =
                '<img src="' + imageUrl + '" alt="' + name + '" class="result-img" onerror="this.src='/static/images/placeholder.jpg'">' +
                '<span class="similarity-pill ' + simClass + '">' + percent + '%</span>' +
                '<div class="card-body">' +
                    '<div class="result-name" title="' + name + '">' + name + '</div>' +
                    '<div class="result-price">¥' + price.toFixed(2) + '</div>' +
                    '<div class="result-meta">' + category + ' · ' + brand + '</div>' +
                    '<div class="result-desc">' + desc + '</div>' +
                    '<button class="btn btn-outline-primary btn-sm w-100 add-to-cart-btn" data-product-id="' + pid + '">' +
                        '<i class="fas fa-shopping-cart me-1"></i>加入购物车' +
                    '</button>' +
                '</div>';
            productGrid.appendChild(card);
        });

        resultsSection.style.display = 'block';
    }

    function showMsg(text, type) {
        hideMsgs();
        var el = type === 'error' ? errorMsg : successMsg;
        el.textContent = text;
        el.style.display = 'block';
    }
    function hideMsgs() {
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
    }

    // Add to cart delegation
    productGrid.addEventListener('click', function(e) {
        var btn = e.target.closest('.add-to-cart-btn');
        if (!btn) return;
        var pid = btn.getAttribute('data-product-id');
        var original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>添加中...';
        btn.disabled = true;

        fetch('/search/api/add_to_cart', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_id: pid, quantity: 1 })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                btn.innerHTML = '<i class="fas fa-check me-1"></i>已添加';
                setTimeout(function() {
                    btn.innerHTML = original;
                    btn.disabled = false;
                }, 1500);
            } else {
                btn.innerHTML = original;
                btn.disabled = false;
                alert(data.message);
            }
        })
        .catch(function() {
            btn.innerHTML = original;
            btn.disabled = false;
            alert('网络错误');
        });
    });
});
</script>
{%- endblock -%}
