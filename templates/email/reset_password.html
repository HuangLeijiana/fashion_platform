<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; padding: 20px; text-align: center; }
        .content { background: #f9f9f9; padding: 20px; }
        .button { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; text-decoration: none; border-radius: 5px; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>云想衣裳</h1>
            <p>智能时尚购物平台</p>
        </div>
        <div class="content">
            <h2>重置您的密码</h2>
            <p>您好！</p>
            <p>我们收到了重置您账户密码的请求。请点击下面的按钮来设置新密码：</p>

            <p style="text-align: center;">
                <a href="{{ reset_url }}" class="button">重置密码</a>
            </p>

            <p>如果按钮无法点击，请复制以下链接到浏览器地址栏：</p>
            <p style="word-break: break-all; color: #666;">{{ reset_url }}</p>

            <p><strong>此链接将在1小时后失效。</strong></p>

            <p>如果您没有请求重置密码，请忽略此邮件。</p>
        </div>
        <div class="footer">
            <p>&copy; 2024 云想衣裳. 保留所有权利.</p>
        </div>
    </div>
</body>
</html>
