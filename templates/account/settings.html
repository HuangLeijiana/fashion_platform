{% extends "base.html" %}{% block title %}账户设置 - 云想衣裳{% endblock %}{% block content %}<div class="container py-5">    <div class="row justify-content-center">        <div class="col-md-8">            <div class="card" style="border:1px solid rgba(0,0,0,0.06);border-radius:20px;overflow:hidden;">                <div class="card-body p-4" style="border-bottom:1px solid rgba(0,0,0,0.04);background:rgba(0,113,227,0.03);">                    <h4 style="font-weight:600;color:#1d1d1f;font-size:1.125rem;margin:0;"><i class="fas fa-gear me-2" style="color:#0071e3;"></i>账户设置</h4>                </div>                <div class="card-body p-4">                    <form method="POST" action="{{ url_for('main.update_account') }}">                        <div class="mb-3">                            <label for="username" class="form-label">用户名</label>                            <input type="text" class="form-control" id="username" name="username" value="{{ current_user.username or '' }}" required>                        </div>                        <div class="mb-3">                            <label for="email" class="form-label">邮箱地址</label>                            <input type="email" class="form-control" id="email" name="email" value="{{ current_user.email or '' }}" required>                        </div>                        <div class="d-flex gap-2 justify-content-end">                            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">取消</a>                            <button type="submit" class="btn btn-primary">保存更改</button>                        </div>                    </form>                </div>            </div>            <div class="card mt-3" style="border:1px solid rgba(0,0,0,0.06);border-radius:20px;overflow:hidden;">                <div class="card-body p-4" style="border-bottom:1px solid rgba(0,0,0,0.04);">                    <h5 style="font-weight:600;color:#1d1d1f;font-size:1rem;margin:0;"><i class="fas fa-shield-halved me-2" style="color:#0071e3;"></i>安全设置</h5>                </div>                <div class="card-body p-3">                    <div class="d-grid gap-2">                        <a href="{{ url_for('main.change_password') }}" class="btn btn-outline-secondary text-start"><i class="fas fa-key me-2"></i>修改密码</a>                        <a href="{{ url_for('main.notification_settings') }}" class="btn btn-outline-secondary text-start"><i class="fas fa-bell me-2"></i>通知设置</a>                        <a href="{{ url_for('main.privacy_settings') }}" class="btn btn-outline-secondary text-start"><i class="fas fa-eye me-2"></i>隐私设置</a>                    </div>                </div>            </div>        </div>    </div></div>{% endblock %}
